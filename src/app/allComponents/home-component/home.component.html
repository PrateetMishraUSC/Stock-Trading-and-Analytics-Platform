<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://kit.fontawesome.com/f26a391ca3.js" crossorigin="anonymous"></script>
</head>

<h2 id="ss-text" class="text-center mt-4 h1 h-sm-2 h-md-3 h-lg-4">
  STOCK SEARCH
</h2>
<form class="example-form row">
  <div class="col-8 col-sm-6 col-md-4 mx-auto text-center position-relative">
    <input
      type="text"
      placeholder="Enter stock ticker symbol"
      [formControl]="control"
      [matAutocomplete]="auto"
      class="searchbar form-control"
      (keyup.enter)="onSearch()"
    />
    <mat-icon
      aria-hidden="false"
      class="searchbar-options position-absolute"
      id="search-icon"
      fontIcon="search"
      (click)="onSearch()"
    ></mat-icon>
    <mat-icon
      aria-hidden="false"
      class="searchbar-options position-absolute"
      fontIcon="clear"
      (click)="onClear()"
    ></mat-icon>
    <mat-autocomplete
      #auto="matAutocomplete"
      class="my-autocomplete"
      [panelWidth]="250"
    >
      <ng-container>
        <mat-option
          *ngFor="let symbol of filteredSymbols | async"
          [value]="splitStockName(symbol)"
          >{{ symbol }}</mat-option
        >
      </ng-container>
    </mat-autocomplete>
  </div>
</form>
