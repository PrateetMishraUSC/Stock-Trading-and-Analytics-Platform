<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<script src="https://kit.fontawesome.com/f26a391ca3.js" crossorigin="anonymous"></script>

<ngb-alert class="alert" *ngIf="watchlist.length === 0" type="warning" [dismissible]="false">
    Currently you don't have any stocks in your watchlist.
</ngb-alert>

<div class="container col-sm-12 col-lg-8 col-12 mx-auto">
    <h2 id="heading" class="mx-3 my-3">My Watchlist</h2>
    <div class="row d-flex mx-auto justify-content-center" *ngIf="watchlist.length">
      <div class="">
        <div class="card custom-card my-2" *ngFor="let item of watchlist" [routerLink]="['/search', item.ticker]" style="cursor: pointer;">
          <div class="card-header" style="border: none; background-color: transparent;">
            <i class="fas fa-xs fa-times" style="float: left; cursor:pointer" (click)="clearCard(item)"></i>
          </div>
          <div class="card-body" *ngIf="price[item.ticker]">
            <div class="row">
              <div class="col row1">
                {{item.ticker}}
              </div>
              <div class="col row1" [style.color]="price[item.ticker]?.d < 0 || price[item.ticker]?.dp < 0 ? 'red' : 'green'">
                {{price[item.ticker]?.c}}
              </div>
            </div>
            <div class="row">
              <div class="col row2">
                {{item.stockname}}
              </div>
              <div class="col row2" [style.color]="price[item.ticker]?.d < 0 || price[item.ticker]?.dp < 0 ? 'red' : 'green'">
                {{price[item.ticker]?.d < 0 ? '▼' : '▲'}} {{price[item.ticker]?.d}} ({{price[item.ticker]?.dp | number:'1.2-2'}}%)
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
</div>
